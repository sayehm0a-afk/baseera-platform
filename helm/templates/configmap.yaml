apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basirah.fullname" . }}-config
  labels:
    {{- include "basirah.labels" . | nindent 4 }}
data:
  log-level: {{ .Values.logging.level | quote }}
  log-format: {{ .Values.logging.format | quote }}
  market-data-provider: {{ .Values.marketData.provider | quote }}
  {{- if .Values.monitoring.enabled }}
  prometheus-enabled: "true"
  {{- end }}
  {{- if .Values.monitoring.prometheus.enabled }}
  prometheus-port: {{ .Values.monitoring.prometheus.port | quote }}
  {{- end }}
