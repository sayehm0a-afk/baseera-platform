apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "basirah.fullname" . }}
  labels:
    {{- include "basirah.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "basirah.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "basirah.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "basirah.fullname" . }}-secrets
              key: database-url
        - name: REDIS_HOST
          value: {{ .Values.redis.host }}
        - name: REDIS_PORT
          value: "{{ .Values.redis.port }}"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "basirah.fullname" . }}-secrets
              key: redis-password
              optional: true
        - name: MARKET_DATA_PROVIDER
          value: {{ .Values.marketData.provider }}
        - name: MARKET_DATA_API_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: {{ include "basirah.fullname" . }}-secrets
              key: market-data-api-endpoint
        - name: MARKET_DATA_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "basirah.fullname" . }}-secrets
              key: market-data-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "basirah.fullname" . }}-secrets
              key: openai-api-key
        - name: LOG_LEVEL
          value: {{ .Values.logging.level }}
        - name: LOG_FORMAT
          value: {{ .Values.logging.format }}
        {{- if .Values.monitoring.enabled }}
        - name: PROMETHEUS_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.healthChecks.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: {{ .Values.healthChecks.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthChecks.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthChecks.liveness.failureThreshold }}
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
        {{- end }}
        {{- if .Values.healthChecks.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            initialDelaySeconds: {{ .Values.healthChecks.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthChecks.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthChecks.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthChecks.readiness.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: logs
          mountPath: {{ .Values.logging.directory }}
      volumes:
      - name: logs
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
