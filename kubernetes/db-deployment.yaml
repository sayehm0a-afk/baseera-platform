apiVersion: apps/v1
kind: Deployment
metadata:
  name: basirah-db
  labels:
    app: basirah
    component: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basirah
      component: db
  template:
    metadata:
      labels:
        app: basirah
        component: db
    spec:
      containers:
      - name: postgres
        image: postgres:13
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: basirah_db
        - name: POSTGRES_USER
          value: user
        - name: POSTGRES_PASSWORD
          value: password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pv-claim
