name: CI

# M0 build-stability gate. Scope is intentionally narrow: prove the
# repository installs, imports, compiles, and its existing tests run in a
# clean environment. It does not validate application behavior beyond
# that -- see docs/architecture/m0-build-status.md for what is and is not
# covered.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Pre-existing repo-wide flake8 violation count as of the M0 milestone,
# recorded so new violations are blocked without requiring an immediate
# repo-wide reformat (out of M0/M1 scope -- see the planned M1.5 "Lint
# Debt Reduction" milestone in docs/architecture/current-status.md and
# the M1 PR description). Recompute locally with:
#   flake8 src/ tests/ main.py --count
#
# ANY CHANGE TO THIS NUMBER REQUIRES EXPLICIT HUMAN REVIEW. This value is
# a real merge gate: raising it silently (in the same PR that adds the
# violations it's meant to block) defeats the gate entirely. This file is
# listed in CODEOWNERS specifically so changes to it are flagged for
# review -- that only auto-requests a reviewer, it does not by itself
# block merging; blocking requires this repository's branch protection to
# additionally require CODEOWNERS review, which is a GitHub repository
# setting this workflow file cannot configure or verify from here.
# Lower this value only when deliberately reducing debt (M1.5), never to
# silence a regression.
env:
  FLAKE8_BASELINE: 0

jobs:
  build-and-test:
    name: Install, compile, test, lint, boot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (clean environment)
        run: pip install -r requirements.txt

      - name: Install package in editable mode
        run: pip install -e . --no-deps

      - name: Compile check (all Python source files)
        run: |
          set -e
          FAILED=0
          find src tests -name '*.py' -not -name '*.cover' > /tmp/pyfiles.txt
          echo "main.py" >> /tmp/pyfiles.txt
          while read -r f; do
            if ! python -m py_compile "$f"; then
              echo "SYNTAX ERROR: $f"
              FAILED=1
            fi
          done < /tmp/pyfiles.txt
          if [ "$FAILED" -ne 0 ]; then
            echo "Compile check failed."
            exit 1
          fi
          echo "Compile check passed: all source files compile cleanly."

      - name: Application boot smoke test (import main.py)
        run: |
          python -c "
          import main
          print('main.py imported successfully')
          print('Routes:', sorted(r.path for r in main.app.routes))
          "

      - name: Test collection check
        run: python -m pytest tests/ --collect-only -q

      - name: Run test suite
        run: python -m pytest tests/ -q -rA

      - name: Lint (flake8, regression gate against documented baseline)
        run: |
          set -e
          COUNT=$(python -m flake8 src/ tests/ main.py --count | tail -1)
          echo "flake8 violation count: $COUNT (baseline: $FLAKE8_BASELINE)"
          if [ "$COUNT" -gt "$FLAKE8_BASELINE" ]; then
            echo "flake8 violations increased ($COUNT > $FLAKE8_BASELINE). New code must not add lint debt."
            exit 1
          fi
          echo "flake8 gate passed (pre-existing debt tracked in docs/architecture/m0-build-status.md, not silenced)."

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
